<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테스트 페이지</title>

  <!-- ✅ Open Graph 태그 (카톡, 텔레그램 미리보기용) -->
  <meta property="og:title" content="테스트 페이지">
  <meta property="og:description" content="이건 GitHub Pages를 이용한 HTML 미리보기 테스트입니다.">
  <meta property="og:image" content="https://raw.githubusercontent.com/goodlight1234/images01/refs/heads/main/goodlight1234.github.io_newletter01_.png">
  <meta property="og:url" content="https://yourid.github.io/my-preview-test/">

  <!-- 트위터 카드(선택사항, 트위터 공유 시) -->
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <h1>HTML 미리보기 테스트</h1>
  <p>카카오톡이나 텔레그램에 이 링크를 공유하면 위의 Open Graph 태그가 미리보기로 보여집니다.</p>
  <img src="sample.jpg" alt="테스트 이미지" width="300">
</body>
</html>
