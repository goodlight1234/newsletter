<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테스트 페이지</title>

  <!-- Open Graph 태그 -->
  <meta property="og:title" content="테스트 페이지">
  <meta property="og:description" content="이건 HTML 테스트 미리보기입니다.">
  <meta property="og:image" content="https://yourdomain.github.io/my-preview-test/sample.jpg">
  <meta property="og:url" content="https://yourdomain.github.io/my-preview-test/">
</head>
<body>
  <h1>HTML 미리보기 테스트</h1>
  <p>카톡이나 텔레그램에 이 페이지를 공유하면, 위의 og:image와 설명이 뜹니다.</p>
</body>
</html>
